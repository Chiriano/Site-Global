<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Categoria | Alpha Convites</title>
  <link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/styles.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    .category-main {
      padding-top: 20px;
      padding-bottom: 50px;
    }
    .category-banner-wrap {
      margin-bottom: 18px;
      border-radius: 10px;
      overflow: hidden;
      background: #f3f4f6;
      border: 1px solid #e5e7eb;
    }
    .category-banner {
      width: 100%;
      height: 260px;
      object-fit: cover;
      display: block;
    }
    .category-top-info {
      margin-bottom: 16px;
    }
    .category-top-info h1 {
      margin: 0 0 6px;
      font-size: 28px;
      color: #1f2937;
    }
    .category-top-info p {
      margin: 0;
      color: #6b7280;
      font-size: 15px;
      font-weight: 600;
    }
    .category-layout {
      display: grid;
      grid-template-columns: 280px 1fr;
      gap: 20px;
      align-items: start;
    }
    .category-sidebar {
      background: #fff;
      border: 1px solid #e5e7eb;
      border-radius: 10px;
      padding: 16px;
      position: sticky;
      top: 15px;
    }
    .filter-block {
      margin-bottom: 16px;
    }
    .filter-block:last-child {
      margin-bottom: 0;
    }
    .filter-title {
      font-size: 13px;
      text-transform: uppercase;
      letter-spacing: 0.4px;
      color: #6b7280;
      margin-bottom: 8px;
      font-weight: 700;
    }
    .filter-control {
      width: 100%;
      height: 38px;
      border: 1px solid #d1d5db;
      border-radius: 6px;
      padding: 0 10px;
      font-size: 14px;
      background: #fff;
    }
    .category-products {
      min-height: 200px;
    }
    .category-actions {
      display: flex;
      gap: 8px;
      justify-content: center;
      margin-top: 8px;
    }
    @media (max-width: 980px) {
      .category-layout {
        grid-template-columns: 1fr;
      }
      .category-sidebar {
        position: static;
      }
      .category-banner {
        height: 190px;
      }
    }
  </style>
</head>
<body>
  <div class="top-utility-bar">
    <div class="container utility-content">
      <a href="#">Atendimento ao Cliente</a>
      <div class="utility-right">
        <span><img src="https://flagcdn.com/16x12/br.png" alt="BR"> pt</span>
        <span>R$ BRL</span>
      </div>
    </div>
  </div>

  <header class="main-header">
    <div class="container header-content">
      <div class="logo">
        <a href="index.html">
          <img src="assets/logo/logo-dark-2.png" alt="Alpha Convites Logo">
        </a>
      </div>
      <div class="search-bar">
        <input type="text" placeholder="O que vocę está procurando?">
        <button type="button"><i class="fas fa-search"></i></button>
      </div>
      <div class="cart-btn">
        <a href="cart.html"><i class="fas fa-shopping-cart"></i> Carrinho <span class="cart-count">(0)</span></a>
      </div>
    </div>
  </header>

  <nav class="main-nav">
    <div class="container nav-content">
      <div class="nav-left">
        <a class="menu-btn" href="category.html"><i class="fas fa-bars"></i> Todos os produtos</a>
        <ul class="nav-links">
          <li><a href="category.html?name=convites">Convites</a></li>
          <li><a href="category.html?name=cartoes">Cartőes</a></li>
          <li><a href="category.html?name=flyers">Flyers</a></li>
          <li><a href="category.html?name=embalagens">Embalagens</a></li>
          <li><a href="category.html?name=brindes">Brindes</a></li>
          <li><a href="category.html?name=roupas">Roupas</a></li>
        </ul>
      </div>
      <div class="nav-right">
        <a href="login.html"><i class="fas fa-user"></i> Entrar / Cadastrar</a>
      </div>
    </div>
  </nav>

  <main class="container category-main">
    <div class="category-banner-wrap">
      <img id="category-banner" class="category-banner" src="https://placehold.co/1600x300/f5f5f5/333333?text=Categoria" alt="Banner da categoria">
    </div>

    <div class="category-top-info">
      <h1 id="category-title">Categoria</h1>
      <p id="category-result-text">Exibindo 0 produtos em Categoria</p>
    </div>

    <div class="category-layout">
      <aside class="category-sidebar">
        <div class="filter-block">
          <div class="filter-title">Categoria</div>
          <div id="sidebar-category">-</div>
        </div>

        <div class="filter-block">
          <div class="filter-title">Produtos Encontrados</div>
          <div id="sidebar-count">0</div>
        </div>

        <div class="filter-block">
          <div class="filter-title">Preço</div>
          <select class="filter-control" id="filter-price">
            <option value="">Todas as faixas</option>
            <option value="ate50">Até R$ 50</option>
            <option value="50a100">R$ 50 a R$ 100</option>
            <option value="acima100">Acima de R$ 100</option>
          </select>
        </div>

        <div class="filter-block">
          <div class="filter-title">Ordenaçăo</div>
          <select class="filter-control" id="filter-sort">
            <option value="relevancia">Mais relevantes</option>
            <option value="menor-preco">Menor preço</option>
            <option value="maior-preco">Maior preço</option>
            <option value="nome">Nome A-Z</option>
          </select>
        </div>

        <div class="filter-block">
          <div class="filter-title">Disponibilidade</div>
          <select class="filter-control" id="filter-stock">
            <option value="">Todos</option>
            <option value="disponivel">Disponível</option>
            <option value="esgotado">Esgotado</option>
          </select>
        </div>
      </aside>

      <section class="category-products">
        <div class="categories-grid" id="category-grid"></div>
      </section>
    </div>
  </main>

  <script src="js/cart.js"></script>
  <script src="js/category-page.js"></script>
</body>
</html>
