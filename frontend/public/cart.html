<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Carrinho | Alpha Convites</title>
  <link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/styles.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    .cart-page {
      max-width: 1200px;
      margin: 30px auto 60px;
      padding: 0 20px;
    }
    .cart-title {
      font-size: 28px;
      margin-bottom: 18px;
      color: #1f2937;
    }
    .cart-header-row,
    .cart-row {
      display: grid;
      grid-template-columns: 110px 1.3fr 150px 120px 160px 120px;
      align-items: center;
      gap: 12px;
      padding: 12px 10px;
      border-bottom: 1px solid #e5e7eb;
    }
    .cart-header-row {
      font-size: 12px;
      color: #6b7280;
      text-transform: uppercase;
      font-weight: 700;
      background: #f8fafc;
      border-radius: 8px 8px 0 0;
    }
    .cart-row {
      background: #fff;
    }
    .cart-image {
      width: 80px;
      height: 80px;
      object-fit: cover;
      border-radius: 8px;
      border: 1px solid #e5e7eb;
    }
    .no-image {
      color: #6b7280;
      font-size: 12px;
    }
    .qty-input {
      width: 80px;
      height: 36px;
      padding: 0 8px;
      border: 1px solid #d1d5db;
      border-radius: 6px;
      font-size: 14px;
    }
    .remove-btn {
      background: #ef4444;
      color: #fff;
      border: 0;
      border-radius: 6px;
      padding: 8px 10px;
      cursor: pointer;
      font-size: 13px;
      font-weight: 600;
    }
    .cart-summary {
      margin-top: 20px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: #fff;
      border: 1px solid #e5e7eb;
      border-radius: 8px;
      padding: 16px;
    }
    .total-text {
      font-size: 22px;
      font-weight: 700;
      color: #111827;
    }
    .checkout-btn {
      background: #e31b23;
      color: #fff;
      border: 0;
      border-radius: 8px;
      padding: 12px 20px;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
    }
    .checkout-btn:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }
    .empty-cart {
      background: #fff;
      border: 1px dashed #d1d5db;
      border-radius: 8px;
      padding: 30px;
      text-align: center;
      color: #6b7280;
      margin-top: 10px;
    }
    .cart-status {
      margin-top: 14px;
      font-weight: 700;
    }
    .cart-status.success { color: #0f9d58; }
    .cart-status.error { color: #d93025; }
    .cart-status.info { color: #2563eb; }
    @media (max-width: 980px) {
      .cart-header-row {
        display: none;
      }
      .cart-row {
        grid-template-columns: 1fr;
        gap: 8px;
        border: 1px solid #e5e7eb;
        border-radius: 8px;
        margin-bottom: 12px;
      }
      .cart-summary {
        flex-direction: column;
        gap: 12px;
        align-items: flex-start;
      }
    }
  </style>
</head>
<body>
  <header class="main-header">
    <div class="container header-content">
      <div class="logo">
        <a href="index.html">
          <img src="assets/logo/logo-dark-2.png" alt="Alpha Convites Logo" style="max-height:60px;">
        </a>
      </div>
      <div class="search-bar">
        <input type="text" placeholder="O que voce esta procurando?">
        <button type="button"><i class="fas fa-search"></i></button>
      </div>
      <div class="cart-btn">
        <a href="cart.html"><i class="fas fa-shopping-cart"></i> Carrinho <span class="cart-count">(0)</span></a>
      </div>
    </div>
  </header>

  <main class="cart-page">
    <h1 class="cart-title">Seu Carrinho</h1>

    <div class="cart-header-row">
      <div>Imagem</div>
      <div>Produto</div>
      <div>Preco Unitario</div>
      <div>Quantidade</div>
      <div>Subtotal</div>
      <div>Acao</div>
    </div>

    <div id="cart-items"></div>

    <div class="cart-summary">
      <div class="total-text">Total: <span id="cart-total">R$ 0,00</span></div>
      <button id="checkout-btn" class="checkout-btn">Finalizar Compra</button>
    </div>
    <div id="cart-status" class="cart-status"></div>
  </main>

  <script src="js/cart.js"></script>
  <script src="js/cart-page.js"></script>
</body>
</html>
