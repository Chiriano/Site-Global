<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Visualizar | Alpha Convites</title>
  <style>
    :root {
      --bg: #131313;
      --panel: #1f1f1f;
      --line: #3b3b3b;
      --text: #f6f4ef;
      --muted: #b8b1a2;
      --green: #2da44e;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      background: radial-gradient(circle at 20% 0%, #2a2a2a, #131313 52%);
      color: var(--text);
      font-family: "Segoe UI", Arial, sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    .vz-top {
      height: 60px;
      display: grid;
      grid-template-columns: 1fr auto 1fr;
      align-items: center;
      padding: 0 16px;
    }

    .vz-title {
      margin: 0;
      text-align: center;
      font-size: 24px;
      grid-column: 2;
    }

    .vz-close {
      justify-self: end;
      grid-column: 3;
      border: 1px solid var(--line);
      background: var(--panel);
      color: var(--text);
      width: 42px;
      height: 42px;
      border-radius: 50%;
      cursor: pointer;
      font-size: 20px;
    }

    .vz-main {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 10px 16px 20px;
      position: relative;
    }

    .vz-arrow {
      display: none;
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      width: 42px;
      height: 42px;
      border-radius: 50%;
      border: 1px solid var(--line);
      background: var(--panel);
      color: var(--text);
    }

    .vz-arrow.left { left: 24px; }
    .vz-arrow.right { right: 24px; }

    .vz-canvas-wrap {
      width: min(100%, 700px);
      max-height: calc(100vh - 190px);
      overflow: auto;
      border: 1px solid var(--line);
      border-radius: 16px;
      background: #111;
      padding: 12px;
      display: flex;
      justify-content: center;
    }

    #visualizar-canvas {
      width: min(100%, 520px);
      height: auto;
      border-radius: 10px;
      box-shadow: 0 10px 20px rgba(0,0,0,.4);
    }

    .vz-bottom {
      border-top: 1px solid var(--line);
      background: rgba(17,17,17,.95);
      padding: 12px 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 20px;
      flex-wrap: wrap;
    }

    .vz-check {
      color: var(--muted);
      font-size: 14px;
      display: flex;
      gap: 8px;
      align-items: center;
    }

    .vz-finish {
      border: 1px solid #2f8f49;
      background: var(--green);
      color: #fff;
      border-radius: 10px;
      font-weight: 700;
      padding: 11px 18px;
      cursor: pointer;
    }

    .vz-finish:disabled {
      opacity: 0.45;
      cursor: not-allowed;
    }
  </style>
</head>
<body>
  <header class="vz-top">
    <h1 class="vz-title">Visualizar</h1>
    <button id="btn-close" class="vz-close" type="button" aria-label="Fechar">&times;</button>
  </header>

  <main class="vz-main">
    <button class="vz-arrow left" type="button" aria-hidden="true">&#8249;</button>
    <div class="vz-canvas-wrap">
      <canvas id="visualizar-canvas" width="2200" height="3000"></canvas>
    </div>
    <button class="vz-arrow right" type="button" aria-hidden="true">&#8250;</button>
  </main>

  <footer class="vz-bottom">
    <label class="vz-check">
      <input id="terms-check" type="checkbox">
      Li e aceito os termos de uso.
    </label>
    <button id="btn-finalizar" class="vz-finish" type="button" disabled>FINALIZAR</button>
  </footer>

  <script src="js/products-data.js"></script>
  <script src="js/visualizar-page.js"></script>
</body>
</html>
